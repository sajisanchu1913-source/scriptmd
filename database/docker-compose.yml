# docker-compose.yml
# This file starts ALL services with one command: docker-compose up

version: '3.8'

services:

  # ── PostgreSQL Database ──
  # Docker downloads this automatically — no installation needed
  postgres:
    image: postgres:16
    container_name: scriptmd-postgres
    environment:
      POSTGRES_DB: scriptmd
      POSTGRES_USER: scriptmd_user
      POSTGRES_PASSWORD: scriptmd123
    ports:
      - "5432:5432"
    volumes:
      # This folder persists data even when container restarts
      - postgres_data:/var/lib/postgresql/data
      # This runs init.sql when PostgreSQL starts for first time
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ── Node.js API Gateway ──
  api-gateway:
    build: ./backend/api-gateway
    container_name: scriptmd-api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: scriptmd-secret-key
      DOCTOR_ACCESS_CODE: SCRIPTMD2026
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: scriptmd
      DB_USER: scriptmd_user
      DB_PASSWORD: scriptmd123
    depends_on:
      - postgres
    volumes:
      - ./backend/api-gateway:/app
      - /app/node_modules

  # ── Python NLP Service ──
  nlp-service:
    build: ./backend/nlp-service
    container_name: scriptmd-nlp-service
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ./backend/nlp-service:/app

  # ── Spring Boot Prescription Service ──
  prescription-service:
    build: ./backend/prescription-service
    container_name: scriptmd-prescription-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scriptmd
      SPRING_DATASOURCE_USERNAME: scriptmd_user
      SPRING_DATASOURCE_PASSWORD: scriptmd123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres

  # ── React Frontend ──
  frontend:
    build: ./frontend
    container_name: scriptmd-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway

# ── Persistent storage for PostgreSQL ──
# Data survives container restarts
volumes:
  postgres_data: