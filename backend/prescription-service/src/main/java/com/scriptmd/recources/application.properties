# Port
server.port=8080

# PostgreSQL config
# "postgres" = the service name in docker-compose.yml
# Docker automatically routes this to the PostgreSQL container
spring.datasource.url=jdbc:postgresql://postgres:5432/scriptmd
spring.datasource.username=scriptmd_user
spring.datasource.password=scriptmd123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect